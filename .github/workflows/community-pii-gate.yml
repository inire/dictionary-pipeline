name: Community PII Gate

on:
  pull_request:
    paths:
      - 'community/**'
  push:
    branches: [master, main]
    paths:
      - 'community/**'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: pip install -e .

      - name: Scan community/ for PII
        run: python scripts/scan_community_pii.py community/
